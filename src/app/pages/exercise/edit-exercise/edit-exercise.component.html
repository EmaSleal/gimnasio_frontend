<div class="edit-exercise-card">
  <div class="edit-exercise-card__body">
    <div class="edit-exercise-card__field">
      <label for="name" class="edit-exercise-card__label">Nombre <span class="edit-exercise-card__required">*</span></label>
      <input id="name" type="text" pInputText [(ngModel)]="workout.name" placeholder="Ej: Press de banca" class="w-full" />
    </div>

    <div class="edit-exercise-card__row">
      <div class="edit-exercise-card__field">
        <label class="edit-exercise-card__label">Grupo Muscular <span class="edit-exercise-card__required">*</span></label>
        <p class="edit-exercise-card__hint">Elegí el grupo muscular principal que trabaja este ejercicio.</p>
        <p-listbox [options]="muscularGroups" [(ngModel)]="workout.muscularGroup.id" optionValue="id" optionLabel="name"
          [filter]="true" filterBy="name" filterPlaceHolder="Buscar grupo muscular..."
          [style]="{'width':'100%'}" [listStyle]="{'max-height': '220px'}" />
      </div>

      <div class="edit-exercise-card__field">
        <label class="edit-exercise-card__label">Carga Muscular <span class="edit-exercise-card__required">*</span></label>
        <p class="edit-exercise-card__hint">Indicá qué tan exigente es el ejercicio.</p>
        <p-listbox [options]="muscularLoadOptions" [(ngModel)]="workout.muscularLoad" optionValue="value" optionLabel="label"
          [style]="{'width':'100%'}" [listStyle]="{'max-height': '220px'}">
          <ng-template let-option pTemplate="item">
            <div class="edit-exercise-card__load-option">
              <span class="edit-exercise-card__load-label">{{ option.label }}</span>
              <span class="edit-exercise-card__load-description">{{ option.description }}</span>
            </div>
          </ng-template>
        </p-listbox>
      </div>
    </div>

    <div class="edit-exercise-card__field" *ngIf="images.length > 0">
      <label class="edit-exercise-card__label">Imágenes</label>
      <div class="edit-exercise-card__image-grid">
        <div class="edit-exercise-card__image-thumb" *ngFor="let image of images">
          <img [src]="baseUrl + image.downloadUrl" [alt]="image.originalFilename" class="edit-exercise-card__image-preview" />
        </div>
      </div>
    </div>
  </div>

  <div class="edit-exercise-card__footer">
    <p-button severity="secondary" label="Cancelar" icon="pi pi-times" (onClick)="ref.close()" />
    <p-button severity="contrast" [loading]="loading" [disabled]="!isFormValid" label="Guardar Cambios" icon="pi pi-check" (onClick)="formSubmit(workout)" />
  </div>
</div>


  <div class="card w-full" >
    <h1 class="m-2">Editar Ejercicio</h1>
    <div class="m-4 modal-body">
      <div class="mb-4">
        <p-floatLabel>
          <input id="name" type="text" pInputText [(ngModel)]="workout.name" />
          <label for="name">Nombre</label>
        </p-floatLabel>
      </div>
      <div class="mb-4">
        <p-listbox [options]="muscularGroups" [(ngModel)]="workout.muscularGroup.id" optionValue="id" optionLabel="name"
          [style]="{'width':'15rem'}" [listStyle]="{'max-height': '220px'}" />
      </div>
      <div class="mb-4">
        <p-listbox [options]="muscularLoads" [(ngModel)]="workout.muscularLoad"
          [style]="{'width':'15rem'}" [listStyle]="{'max-height': '220px'}" />
      </div>
    </div>
    <div class="m-4">
      <p-button severity="contrast" [loading]="loading" label="Submit" icon="pi pi-check" (onClick)="formSubmit(workout)" />
      <p-button severity="secondary" label="Cancel" icon="pi pi-times" class="ml-2" (onClick)="ref.close()" />
    </div>
  </div>

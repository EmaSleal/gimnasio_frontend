<div class="container">
    <h1> Panel de Ejercicio</h1>
    @if (isActive('/exercise/list') || isActive('/exercise')) {
        <mat-tab-group [(selectedIndex)]="index" (selectedTabChange)="onTabChange($event)">
            <mat-tab label="Ejercicios" routerLink="/exercise/list">
                <app-list-exercise/>
            </mat-tab>
            <mat-tab label="Agregar Ejercicio" routerLink="/exercise">
                <app-add-exercise/>
            </mat-tab>
        </mat-tab-group>        
    }
    @else {
        <router-outlet ></router-outlet>
    }
</div>

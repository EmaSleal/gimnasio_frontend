<div class="container">
  <h1>Panel de Usuarios</h1>
  @if (isActive('/user/list') || isActive('/user')) {
    <p-tabView [(activeIndex)]="index" (onChange)="onTabChange($event)">
      <p-tabPanel header="Usuarios">
        <app-list-user />
      </p-tabPanel>
      <p-tabPanel header="Agregar Usuario">
        <app-add-user />
      </p-tabPanel>
    </p-tabView>
  } @else {
    <router-outlet></router-outlet>
  }
</div>

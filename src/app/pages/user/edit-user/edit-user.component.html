<app-card title="Edit User">
  <form [formGroup]="userForm">
    <div class="mb-3">
      <p-floatLabel>
        <input pInputText id="username" type="text" formControlName="username" required />
        <label for="username">Username</label>
      </p-floatLabel>
    </div>

    <div class="mb-3">
      <p-floatLabel>
        <input pInputText id="email" type="email" formControlName="email" required />
        <label for="email">Email</label>
      </p-floatLabel>
    </div>

    <div class="mb-3">
      <p-dropdown
        id="role"
        formControlName="role"
        [options]="roleOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select Role"
        required
      ></p-dropdown>
    </div>

    <div class="mb-3">
      <p-checkbox formControlName="enabled" [binary]="true" label="Enabled"></p-checkbox>
    </div>

    <div class="flex gap-2">
      <p-button label="Save" severity="primary" (onClick)="submitForm()"></p-button>
      <p-button label="Cancel" severity="secondary" (onClick)="cerrarModal()"></p-button>
    </div>
  </form>
</app-card>

<div class="card w-3/4">
  <div class="flex md:hidden justify-content-end mb-3">
    <button type="button" class="list-muscular-group__filters-toggle" (click)="filtersExpanded = !filtersExpanded">
      <i class="pi pi-filter"></i>
      Filtros
      <i class="pi" [ngClass]="filtersExpanded ? 'pi-chevron-up' : 'pi-chevron-down'"></i>
    </button>
  </div>

  <div class="list-muscular-group__filters" [class.list-muscular-group__filters--expanded]="filtersExpanded">
    <span class="p-input-icon-left list-muscular-group__search">
      <i class="pi pi-search"></i>
      <input type="text" pInputText placeholder="Buscar grupo muscular..." [(ngModel)]="searchTerm" (ngModelChange)="applyFilters()" />
    </span>
  </div>

  <div class="hidden lg:block">
    <app-table [dataSource]="filteredTableDataSource" [displayedColumns]="displayedColumns" (editItem)="editMuscularGroup($event)"
      (deleteItem)="deleteMuscularGroup($event)" (rowClick)="selectMuscularGroup($event)" />
  </div>
  <div class="lg:hidden">
    
    <p-dataView #dv [value]="filteredDataSource" layout="list">
        <ng-template pTemplate="list" let-muscularGroups>
            @if(muscularGroups.length>0){
            <div class="grid grid-nogutter">
                @for(muscle of muscularGroups; track muscle.id) {
                <div class="col-12">
                  <div class="hidden md:flex lg:hidden md:align-items-center p-4 gap-3"
                    [ngClass]="{ 'border-top-1 surface-border': !muscle.id }">
                    <div class="md:w-10rem relative">
                      <img class="block xl:block mx-auto border-round w-full"
                        [src]="muscle.imageUrl || '../../../../assets/banner.png'"
                        [alt]="muscle.name" />
                    </div>
                    <div class="flex flex-column md:flex-row justify-content-between md:align-items-center flex-1 gap-4">
                      <div class="flex flex-row md:flex-column justify-content-between align-items-start gap-2">
                        <div class="text-lg font-medium text-900">{{ muscle.name }}</div>
                      </div>
                      <div class="flex flex-column md:align-items-end gap-5">
                        <div class="flex flex-row-reverse md:flex-row gap-2">
                          <p-button icon="pi pi-pencil" [outlined]="true" (onClick)="editMuscularGroup(muscle)" />
                          <p-button icon="pi pi-eye" class="flex-auto md:flex-initial white-space-nowrap" label="VER" (onClick)="selectMuscularGroup(muscle)" />
                          <p-button icon="pi pi-trash" class="flex-auto md:flex-initial white-space-nowrap" label="Eliminar"
                            severity="danger" (onClick)="deleteMuscularGroup(muscle)" />
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="flex md:hidden">
                    <div class="list-card w-full">
                      <div class="list-card__media">
                        <img [src]="muscle.imageUrl || '../../../../assets/banner.png'" [alt]="muscle.name" />
                      </div>
                      <div class="list-card__body">
                        <div class="list-card__title">{{ muscle.name }}</div>
                      </div>
                      <div class="list-card__actions">
                        <p-button icon="pi pi-pencil" [outlined]="true" (onClick)="editMuscularGroup(muscle)" />
                        <p-button icon="pi pi-eye" label="Ver" (onClick)="selectMuscularGroup(muscle)" />
                        <p-button icon="pi pi-trash" label="Eliminar" severity="danger" (onClick)="deleteMuscularGroup(muscle)" />
                      </div>
                    </div>
                  </div>
                </div>

                }
            </div>
            }
        </ng-template>
    </p-dataView>
    
  </div>
</div>

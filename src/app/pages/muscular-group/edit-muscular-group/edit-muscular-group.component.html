<app-card title="Add User">

    <form [formGroup]="muscularGroupForm">
      <div style="display: none;">
        <mat-form-field>
          <mat-label for="id">id:</mat-label>
          <input matInput type="text" id="id" name="id" formControlName="id">
        </mat-form-field>
      </div>
      <div>
        <mat-form-field>
          <mat-label for="name">Username:</mat-label>
          <input matInput type="text" id="name" name="name" formControlName="name" required>
        </mat-form-field>
      </div>
      <div>
        <button mat-raised-button color="primary" (click)="submitForm()">Save</button>
        <button mat-button (click)="cerrarModal()">Cancel</button>
      </div>
    </form>
  </app-card>

<app-card title="Edit Muscular Group">
  <form [formGroup]="muscularGroupForm">
    <div style="display: none;">
      <input type="hidden" formControlName="id" />
    </div>
    <div class="mb-3">
      <p-floatLabel>
        <input pInputText id="name" type="text" formControlName="name" required />
        <label for="name">Name</label>
      </p-floatLabel>
    </div>
    <div class="flex gap-2">
      <p-button label="Save" severity="primary" (onClick)="submitForm()"></p-button>
      <p-button label="Cancel" severity="secondary" (onClick)="cerrarModal()"></p-button>
    </div>
  </form>
</app-card>

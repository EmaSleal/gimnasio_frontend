<div class="container">
    <h1> Panel de Grupo Muscular</h1>
    @if (isActive('/muscular-group/list') || isActive('/muscular-group')) {
        <mat-tab-group [(selectedIndex)]="index" (selectedTabChange)="onTabChange($event)">
            <mat-tab label="Grupos Musculares" routerLink="/muscular-group/list">
                <app-list-muscular-group/>
            </mat-tab>
            <mat-tab label="Agregar Grupo Muscular" routerLink="/muscular-group">
                <app-add-muscular-group/>
            </mat-tab>
        </mat-tab-group>        
    }
    @else {
        <router-outlet ></router-outlet>
    }
</div>

<app-card title="Add User">

    <form [formGroup]="muscularGroupForm">
      <div>
        <mat-form-field>
          <mat-label for="name">Username:</mat-label>
          <input matInput type="text" id="name" name="name" formControlName="name" required>
        </mat-form-field>
      </div>
      <div>
        <button mat-raised-button color="primary" (click)="submitForm()">Add Muscular Group</button>
      </div>
    </form>
  </app-card>

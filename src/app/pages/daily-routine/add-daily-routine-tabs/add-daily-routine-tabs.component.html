<section>
  <p-button
    label="Añadir Rutina"
    severity="primary"
    (click)="addRoutine()"
  />
  <p-tabView>
    @for (routine of routines; track $index) {
      <p-tabPanel [header]="'Routine ' + ($index + 1)">
        <app-add-daily-routine [formIndex]="$index"></app-add-daily-routine>
      </p-tabPanel>
    }
  </p-tabView>
  <p-button
    label="Submit All"
    severity="primary"
    (click)="submitAllForms()"
  />
</section>

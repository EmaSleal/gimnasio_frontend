<div class="container">
    <h1> Panel de Rutina </h1>
    @if (isActive('/workout-plan/list') || isActive('/workout-plan')) {
        <mat-tab-group [(selectedIndex)]="index" (selectedTabChange)="onTabChange($event)">
            <mat-tab label="Rutinas" routerLink="/workout-plan/list">
                hola
            </mat-tab>
            <mat-tab label="Agregar Rutina" routerLink="/workout-plan">
                <app-add-daily-routine/>
            </mat-tab>
        </mat-tab-group>        
    }
    @else {
        <router-outlet ></router-outlet>
    }
</div>

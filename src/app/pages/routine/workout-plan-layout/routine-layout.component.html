<div class="container">
  <h1>Panel de Rutina</h1>
  @if (isActive('/workout-plan/list') || isActive('/workout-plan')) {
    <p-tabView [(activeIndex)]="index" (onChange)="onTabChange($event)">
      <p-tabPanel header="Rutinas">
        <app-list-routine />
      </p-tabPanel>
      <p-tabPanel header="Agregar Rutina">
        <app-add-workout-plan />
      </p-tabPanel>
    </p-tabView>
  } @else {
    <router-outlet></router-outlet>
  }
</div>

<app-card title="Agregar Rutina">
  <p-steps [model]="steps" [(activeIndex)]="activeIndex" [readonly]="false"></p-steps>

  <!-- Step 0: General Data -->
  @if (activeIndex === 0) {
  <div class="mt-4">
    <form [formGroup]="Formulario1">

      <div class="mb-3">
        <p-inputSwitch formControlName="isTemplate" (onChange)="toggleIsTemplate()"></p-inputSwitch>
        <label class="ml-2">Is Template</label>
      </div>

      @if(!isTemplate) {
      <div class="mb-3">
        <p-dropdown
          id="user"
          formControlName="user"
          [options]="userOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar usuario"
          required
        ></p-dropdown>
      </div>

      <div class="mb-3">
        <p-floatLabel>
          <input pInputText id="description" type="text" formControlName="description" required class="w-full" />
          <label for="description">Description</label>
        </p-floatLabel>
      </div>

      <div class="mb-3">
        <label class="block mb-1">Start Date</label>
        <p-calendar formControlName="startDate" [showIcon]="true" dateFormat="dd/mm/yy" placeholder="Start date"></p-calendar>
      </div>

      <div class="mb-3">
        <label class="block mb-1">End Date</label>
        <p-calendar formControlName="endDate" [showIcon]="true" dateFormat="dd/mm/yy" placeholder="End date"></p-calendar>
      </div>
      }

      <div class="mt-3">
        <p-button label="Next" (onClick)="activeIndex = 1"></p-button>
      </div>
    </form>
  </div>
  }

  <!-- Step 1: Routines -->
  @if (activeIndex === 1) {
  <div class="mt-4">
    <div class="mb-3">
      <p-button label="Cargar Plantillas" (onClick)="getTemplates()"></p-button>
    </div>

    @if (templates.length > 0) {
    <div class="mb-3">
      <p-dropdown
        id="template"
        [options]="templateOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Seleccionar plantilla"
        (onChange)="onTemplateChange($event)"
      ></p-dropdown>
    </div>
    }

    <app-add-daily-routine-tabs
      [IsChanged]="IsTemplateValueChanged"
      [IsSubmitted]="submit"
      (formSubmitted)="formSubmit($event)"
      (IsFormChanged)="checkFormChanged($event)"
      [TemplateValues]="templateValueDailyRoutines"
    />

    <div class="flex gap-2 mt-3">
      <p-button label="Back" severity="secondary" (onClick)="activeIndex = 0"></p-button>
      <p-button label="Submit" severity="primary" (onClick)="onSubmit()"></p-button>
    </div>
  </div>
  }
</app-card>

<app-card title="Agregar Rutina">
  <!-- select for users-->
  <mat-vertical-stepper [linear]="false" #stepper>
    <mat-step [stepControl]="Formulario1" editable>
      <form [formGroup]="Formulario1">
        <div>
          <mat-form-field>
            <mat-label for="user">User:</mat-label>
            <mat-select id="user" name="user" formControlName="user" required>
              <mat-option [value]="undefined">Seleccionar</mat-option>
              @for (item of users; track $index) {
              <mat-option [value]="item.id">{{ item.userName }}</mat-option>
              }
            </mat-select>
          </mat-form-field>
        </div>
        <div>
          <mat-form-field>
            <mat-label for="description">description:</mat-label>
            <input
              matInput
              type="text"
              id="description"
              name="description"
              formControlName="description"
              required
            />
          </mat-form-field>
        </div>
        <div>
          <mat-form-field>
            <mat-label>Enter a date range</mat-label>
            <mat-date-range-input [rangePicker]="picker">
              <input
                matStartDate
                placeholder="Start date"
                formControlName="startDate"
              />
              <input
                matEndDate
                placeholder="End date"
                formControlName="endDate"
              />
            </mat-date-range-input>
            <mat-datepicker-toggle
              matIconSuffix
              [for]="picker"
            ></mat-datepicker-toggle>
            <mat-date-range-picker #picker></mat-date-range-picker>
          </mat-form-field>
        </div>

        <div>
          <button mat-button matStepperNext>Next</button>
        </div>
      </form>
    </mat-step>

    <mat-step [stepControl]="dailyRoutineFormArray">
      <button mat-raised-button (click)="addTab(true)">
        Agregar Otra Rutina
      </button>
      <mat-tab-group
        [selectedIndex]="selected.value"
        (selectedIndexChange)="selected.setValue($event)"
      >
        <form [formGroup]="dailyRoutineFormArray">
          <div formArrayName="dailyRoutines">
            @for (tab of tabs; track $index) {
            <mat-tab [label]="tab">
              <app-add-daily-routine></app-add-daily-routine>
            </mat-tab>
            }
          </div>
        </form>
      </mat-tab-group>
    </mat-step>
  </mat-vertical-stepper>
</app-card>

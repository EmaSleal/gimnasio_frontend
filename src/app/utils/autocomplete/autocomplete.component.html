<div>
  <input
    pInputText
    placeholder="Filter"
    (keyup)="applyFilter($event)"
    class="w-full"
  />

  <p-listbox
    [options]="listDataSource"
    (onChange)="onSelect($event.value)"
    styleClass="list-items w-full"
  >
    <ng-template pTemplate="item" let-suggestion>
      <span>{{ suggestion.nombre }} {{ suggestion.presentacion }}</span>
    </ng-template>
  </p-listbox>
</div>
